name: Deploy to Aston Server
on:
  push:
    branches:
      - actual-website-code

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd 9Mint
            git fetch origin actual-website-code
            git reset --hard origin/actual-website-code
            echo "Successfully updated 9Mint!"
